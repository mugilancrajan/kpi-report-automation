name: Weekly KPI Report Pipeline

on:
  workflow_dispatch:
  schedule:
    # Run every Monday at 8 AM UTC
    - cron: "0 8 * * 1"

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate sample data
        run: python src/generate_sample_data.py
      
      - name: Clean data and compute KPIs
        run: python src/clean_and_kpi.py
      
      - name: Build report and charts
        run: python src/build_report.py
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kpi-report
          path: |
            outputs/report.html
            outputs/weekly_kpis.csv
            outputs/cleaned_leads.csv
            outputs/charts/
          retention-days: 30
