name: Weekly KPI Report Pipeline

on:
  schedule:
    # Run every Monday at 8 AM UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate sample data
        run: python src/generate_sample_data.py
      
      - name: Clean data and compute KPIs
        run: python src/clean_and_kpi.py
      
      - name: Build report and charts
        run: python src/build_report.py
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: kpi-report
          path: |
            outputs/report.html
            outputs/weekly_kpis.csv
            outputs/cleaned_leads.csv
            outputs/charts/
          retention-days: 30
      
      - name: Create workflow summary
        run: |
          echo "## ✅ KPI Report Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report Outputs:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📄 HTML Report: \`outputs/report.html\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Weekly KPIs: \`outputs/weekly_kpis.csv\`" >> $GITHUB_STEP_SUMMARY
          echo "- 🧹 Cleaned Data: \`outputs/cleaned_leads.csv\`" >> $GITHUB_STEP_SUMMARY
          echo "- 📈 Charts: \`outputs/charts/\`" >> $GITHUB_STEP_SUMMARY

